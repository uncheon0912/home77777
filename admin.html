<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>관리자 대시보드</title><link rel="stylesheet" href="styles.css"></head><body><main class="form-page"><div class="container form-shell"><section id="login-panel" class="panel"><h1>관리자 로그인</h1><form id="login-form"><div class="field"><label for="password">비밀번호</label><input id="password" type="password" required autocomplete="current-password"></div><div id="login-error" class="notice"></div><button class="button" style="width:100%">로그인</button></form></section><section id="dashboard" class="panel" style="display:none"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap"><h1>게시글 관리</h1><div class="admin-actions"><a class="small-button" href="news-write.html">새 글 작성</a><button id="logout" class="small-button danger">로그아웃</button></div></div><div id="admin-list" class="table-wrap"></div></section></div></main><script src="db.js"></script><script>
const loginPanel=document.getElementById('login-panel'),dashboard=document.getElementById('dashboard'),list=document.getElementById('admin-list');function show(){loginPanel.style.display=isAdmin()?'none':'block';dashboard.style.display=isAdmin()?'block':'none';if(isAdmin())render()}async function render(){const ps=await getPosts();list.innerHTML=ps.length?`<table class="admin-table"><thead><tr><th>번호</th><th>카테고리</th><th>제목</th><th>작성일</th><th>관리</th></tr></thead><tbody>${ps.map((p,i)=>`<tr><td>${ps.length-i}</td><td>${escapeHtml(p.category||'')}</td><td><a href="news-detail.html?id=${encodeURIComponent(p.id)}">${escapeHtml(p.title||'')}</a></td><td>${escapeHtml(p.date||'')}</td><td><div class="admin-actions"><a class="small-button" href="news-write.html?id=${encodeURIComponent(p.id)}">수정</a><button class="small-button danger" data-delete="${p.id}">삭제</button></div></td></tr>`).join('')}</tbody></table>`:'<div class="empty">작성된 게시글이 없습니다.</div>';list.querySelectorAll('[data-delete]').forEach(b=>b.addEventListener('click',async()=>{if(confirm('삭제할까요?')){await deletePost(b.dataset.delete);render()}}))}document.getElementById('login-form').addEventListener('submit',async e=>{e.preventDefault();const cfg=await loadConfig();if(document.getElementById('password').value===cfg.admin_password){sessionStorage.setItem('isAdmin','true');location.reload()}else document.getElementById('login-error').textContent='비밀번호가 올바르지 않습니다.'});document.getElementById('logout').addEventListener('click',()=>{sessionStorage.removeItem('isAdmin');location.reload()});show();</script></body></html>
