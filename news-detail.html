<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>게시글</title><link rel="stylesheet" href="styles.css"></head><body><header class="topbar"><div class="container topbar-inner"><a class="brand" href="index.html">분당 욕실 리모델링</a><nav class="nav"><a href="index.html">홈</a><a class="active" href="news.html">소식</a></nav><a class="cta" href="tel:031-1234-5678">상담하기</a></div></header><main class="article"><div id="article-head" class="article-head"></div><div id="article-actions" class="article-actions"></div><article id="article-content" class="markdown"></article></main><footer class="footer"><div class="container footer-row"><span class="muted">© 2026 분당 욕실 리모델링</span><a href="admin.html">Agent Login</a></div></footer><nav class="bottom-nav"><a href="index.html">홈</a><a class="active" href="news.html">소식</a><a href="tel:031-1234-5678">상담</a><a href="admin.html">관리자</a></nav><script src="db.js"></script><script>
const id=new URLSearchParams(location.search).get('id');getPosts().then(posts=>{const p=posts.find(x=>x.id===id);if(!p){document.getElementById('article-content').innerHTML='<div class="empty">게시글을 찾을 수 없습니다.</div>';return}document.title=p.title;document.getElementById('article-head').innerHTML=`<div class="post-meta"><span class="badge">${escapeHtml(p.category||'소식')}</span><span>${escapeHtml(p.date||'')}</span></div><h1>${escapeHtml(p.title)}</h1>`;document.getElementById('article-content').innerHTML=renderMarkdown(p.content);if(isAdmin())document.getElementById('article-actions').innerHTML=`<a class="small-button" href="news-write.html?id=${encodeURIComponent(p.id)}">수정</a><button class="small-button danger" id="delete-btn">삭제</button>`;document.getElementById('delete-btn')?.addEventListener('click',async()=>{if(confirm('이 게시글을 삭제할까요?')){await deletePost(p.id);location.href='news.html'}})});</script></body></html>
