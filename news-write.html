<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>게시글 작성</title><link rel="stylesheet" href="styles.css"></head><body><header class="topbar"><div class="container topbar-inner"><a class="brand" href="index.html">분당 욕실 리모델링</a><a class="small-button" href="admin.html">관리자 대시보드</a></div></header><main class="form-page"><div class="container form-shell"><div class="panel"><h1 id="form-title">새 글 작성</h1><form id="post-form"><div class="field"><label for="title">제목</label><input id="title" required></div><div class="field"><label for="category">카테고리</label><select id="category"><option>꿀팁</option><option>뉴스</option><option>공지사항</option><option>시공후기</option></select></div><div class="field"><label for="date">작성일</label><input id="date" type="date" required></div><div class="field"><label for="content">본문 마크다운</label><textarea id="content" required placeholder="# 제목\n\n본문을 작성하세요."></textarea></div><div id="form-notice" class="notice"></div><div class="actions"><button class="button" type="submit">저장하기</button><a class="button secondary" href="admin.html">취소</a></div></form></div></div></main><script src="db.js"></script><script>
if(!requireAdmin()){}else{const id=new URLSearchParams(location.search).get('id'),form=document.getElementById('post-form');document.getElementById('date').value=new Date().toISOString().slice(0,10);if(id)getPosts().then(ps=>{const p=ps.find(x=>x.id===id);if(!p)return;document.getElementById('form-title').textContent='게시글 수정';title.value=p.title;category.value=p.category;date.value=p.date;content.value=p.content});form.addEventListener('submit',async e=>{e.preventDefault();const notice=document.getElementById('form-notice');notice.textContent='저장 중입니다.';const post={title:title.value.trim(),category:category.value,date:date.value,content:content.value};try{if(id)await updatePost(id,post);else await createPost(post);location.href='admin.html'}catch(err){notice.textContent=err.message}})}</script></body></html>
