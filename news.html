<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>분당 욕실 소식</title><link rel="stylesheet" href="styles.css"></head><body><header class="topbar"><div class="container topbar-inner"><a class="brand" href="index.html">분당 욕실 리모델링</a><nav class="nav"><a href="index.html">리모델링 사례</a><a class="active" href="news.html">인테리어 팁</a></nav><a class="cta" href="tel:031-1234-5678">무료 견적 상담</a></div></header><header class="board-hero"><div class="container"><h1>분당 욕실 소식</h1><p class="muted">최신 트렌드부터 실용적인 인테리어 팁까지 전해드립니다.</p><div class="search"><input id="search-input" type="search" placeholder="관심 있는 키워드를 검색해 보세요"></div></div></header><main class="container board-layout"><section><div class="tabs"><button class="tab active" data-category="전체">전체</button><button class="tab" data-category="뉴스">뉴스</button><button class="tab" data-category="공지사항">공지사항</button><button class="tab" data-category="꿀팁">꿀팁</button><button class="tab" data-category="시공후기">시공후기</button></div><div id="news-list" class="post-list"><div class="empty">게시글을 불러오는 중입니다.</div></div></section><aside class="sidebar-stack"><div class="sidebar-card"><div class="profile"><img src="screen.png" alt="대표자 사진"><div><strong>홍길동 대표</strong><div class="muted">분당 욕실 전문가</div></div></div><p class="muted">15년 경력의 전문가가 직접 상담합니다.</p><a class="button" style="width:100%" href="tel:031-1234-5678">전화 상담 연결</a></div><div class="sidebar-card"><h3>인기 키워드</h3><p class="muted">#타일교체　#방수공사　#건식욕실<br>#가성비리모델링</p></div></aside></main><footer class="footer"><div class="container footer-row"><span class="muted">© 2026 분당 욕실 리모델링</span><a href="admin.html">Agent Login</a></div></footer><nav class="bottom-nav"><a href="index.html">홈</a><a class="active" href="news.html">소식</a><a href="tel:031-1234-5678">상담</a><a href="admin.html">관리자</a></nav><script src="db.js"></script><script>
let posts=[],category='전체';const list=document.getElementById('news-list'),input=document.getElementById('search-input');function render(){const q=input.value.trim().toLowerCase();const filtered=posts.filter(p=>(category==='전체'||p.category===category)&&(!q||`${p.title} ${p.content}`.toLowerCase().includes(q)));list.innerHTML=filtered.length?filtered.map(p=>`<a class="list-card" href="news-detail.html?id=${encodeURIComponent(p.id)}"><img class="list-image" src="screen.png" alt=""><div><div class="post-meta"><span class="badge">${escapeHtml(p.category||'소식')}</span><span>${escapeHtml(p.date||'')}</span></div><h2>${escapeHtml(p.title||'제목 없음')}</h2><p class="muted">${escapeHtml(markdownToText(p.content).slice(0,120))}</p></div></a>`).join(''):'<div class="empty">작성된 게시글이 없습니다.</div>'}getPosts().then(p=>{posts=p;render()});input.addEventListener('input',render);document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{category=b.dataset.category;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));render()}));</script></body></html>
